
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Signs V4 Swipe Demo</title>
<style>
body{font-family:Arial;background:#0d0b1a;color:white;max-width:500px;margin:auto;padding:20px}
.card{background:#1b1630;border:1px solid #444;border-radius:24px;padding:24px;text-align:center}
.sign{font-size:64px}
.score{font-size:40px;color:#f4d19a}
.buttons{display:flex;justify-content:center;gap:20px;margin-top:20px}
button{padding:16px 20px;border-radius:50px;border:none;font-size:20px}
</style>
</head>
<body>
<h1>Signs V4 Swipe Demo</h1>
<div class="card">
<div class="sign">♊</div>
<h2>Emma, 29</h2>
<p>Gemini • 8 miles away</p>
<p>Loves bookstores, road trips, and coffee dates.</p>
<div class="score">96% Match</div>
<p>Aquarius + Gemini thrive on curiosity and conversation.</p>
<div class="buttons">
<button>❌ Pass</button>
<button>⭐ Super Sign</button>
<button>❤️ Like</button>
</div>
</div>
</body>
</html>
